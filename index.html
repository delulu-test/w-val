<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can't send a hug, so I made this for you 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1 id="typewriter" style="min-height: 80px;">Press start to see...</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/L_y2jP4mU38AAAAj/bubu-dudu-bubu.gif" alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleNextStep()">Click here</button>
            <button id="no-btn" style="display: none;">No</button>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="script.js"></script>
</body>
</html>
