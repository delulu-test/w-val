<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can't send a hug, so I made this for you 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
    <body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Can't send a hug, so I made this for you 💕</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif" alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn">Yes</button>
<button id="no-btn">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <!-- 🎵 MUSIC (CHỈ 1 CÁI DUY NHẤT) -->
    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <script>
    const music = document.getElementById("bg-music")

    window.addEventListener("load", () => {
        const savedTime = localStorage.getItem("musicTime")
        if (savedTime) {
            music.currentTime = savedTime
        }
        music.play().catch(() => {})
    })

    music.addEventListener("timeupdate", () => {
        localStorage.setItem("musicTime", music.currentTime)
    })

    // nếu browser chặn autoplay
    document.addEventListener("click", function () {
        music.play().catch(()=>{})
    }, { once: true })
    </script>

    <script src="script.js"></script>
</body>
</html>
