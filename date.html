<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner First 💕</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="hearts-bg"></div>

<div class="container">
    <h1>First… where are we having dinner? 😌</h1>

    <div class="food-grid">

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/thai.jpg">
            <p>Thai Market</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/salmon.jpg">
            <p>Salmon Club</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/manwah.jpg">
            <p>Manwah</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/gogi.jpg">
            <p>Gogi</p>
        </div>

        <div class="food-card" onclick="correctDinner()">
            <img src="images/4ps.jpg">
            <p>4P's</p>
        </div>

    </div>

    <p id="dinner-message"></p>
</div>

<script>
const wrongMessages = [
    "Nope! ❌",
    "Not today...",
    "Try again, maybe? 😏",
    "My stomach says no."
];

function wrongDinner(){
    const msg =
        wrongMessages[Math.floor(Math.random() * wrongMessages.length)];

    document.getElementById("dinner-message").textContent = msg;
}

function correctDinner(){
    window.location.href = "after.html";
}
</script>

</body>
</html>
