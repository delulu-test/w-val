<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner First 💕</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="hearts-bg"></div>

<div class="container">
    <h1>First… where are we having dinner? 😌</h1>
    
<div style="min-height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
            <p id="dinner-message" style="font-weight: 800; font-size: 1.3rem; color: #ff1493; transition: opacity 0.3s ease;"></p>
        </div>
    
    <div class="food-grid">

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/thai.png">
            <p>Thai Market</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/salmon.png">
            <p>Salmon Club</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/manwah.jpg">
            <p>Manwah</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/gogi.png">
            <p>Gogi</p>
        </div>

        <div class="food-card" onclick="correctDinner()">
            <img src="images/4p.png">
            <p>4P's</p>
        </div>

    </div>

</div>

<script>
const wrongMessages = [
    "My stomach says no.🙅‍♀️",
    "My stomach says no.🤧",
    "Try again!💔",
    "Error 404: Appetite not found. 🚫",
    "Ugh, no!🤧"
]

function wrongDinner(){
    const msg = document.getElementById("dinner-message")

    // Reset ngay lập tức để không bị khựng
    msg.style.transition = "none"
    msg.style.opacity = 0

    // Force reflow để browser reset animation
    void msg.offsetWidth

    const randomText = wrongMessages[Math.floor(Math.random() * wrongMessages.length)]

    msg.textContent = randomText

    // Bật lại transition
    msg.style.transition = "opacity 0.3s ease"
    msg.style.opacity = 1
}

    function correctDinner(){
    const msg = document.getElementById("dinner-message")

    msg.style.opacity = 0

    setTimeout(() => {
        msg.textContent = "Good choice… you know me too well. You win this round 😌💕"
        msg.style.opacity = 1
        msg.style.fontWeight = "900"
    }, 200)

    // Chờ 2 giây rồi mới chuyển
    setTimeout(() => {
        window.location.href = "after.html"
    }, 2200)
}
</script>
</script>

</body>
    <audio id="bg-music" loop>
    <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
</audio>
    <script>
const music = document.getElementById("bg-music")

// Khi trang load
window.addEventListener("load", () => {

    // Lấy thời gian đã lưu
    const savedTime = localStorage.getItem("musicTime")
    if (savedTime) {
        music.currentTime = savedTime
    }

    // Tự phát nhạc
    music.play().catch(() => {})
})

// Lưu thời gian hiện tại liên tục
music.addEventListener("timeupdate", () => {
    localStorage.setItem("musicTime", music.currentTime)
})
</script>
</html>
