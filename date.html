<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner First 💕</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="hearts-bg"></div>

<div class="container" style="padding-top: 20px; margin-top: 10px;">
    <h1>First… where are we having dinner? 😌</h1>
    
<div style="height: 50px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;">
            <p id="dinner-message" style="font-weight: 800; font-size: 1.2rem; color: #ff1493; margin: 0;"></p>
        </div>
    
    <div class="food-grid">

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/thai.png">
            <p>Thai Market</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/salmon.png">
            <p>Salmon Club</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/manwah.jpg">
            <p>Manwah</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/gogi.png">
            <p>Gogi</p>
        </div>

        <div class="food-card" onclick="correctDinner()">
            <img src="images/4p.png">
            <p>4P's</p>
        </div>

    </div>

</div>

<script>
const wrongMessages = [
    "My stomach says no.🙅‍♀️",
    "My stomach says no.🤧",
    "Try again!💔",
    "Error 404: Appetite not found. 🚫",
    "Ugh, no!🤧"
]

function wrongDinner() {
    const msg = document.getElementById("dinner-message");
    
    // 1. Hiện ra ngay lập tức, không để transition 0.5s cho đỡ cảm giác mờ
    msg.style.transition = "none"; 
    msg.style.opacity = 1;

    msg.textContent = wrongMessages[Math.floor(Math.random() * wrongMessages.length)];
    
    // 2. Thay bằng màu ĐỎ ĐẬM hoặc HỒNG ĐẬM (Đừng dùng màu nhạt)
    msg.style.color = "#d63384"; // Màu hồng đậm cực sắc nét
    // Hoặc nếu muốn đỏ hẳn thì: msg.style.color = "#ff4d4d";

    // 3. Cho chữ to lên tí nữa cho dễ đọc
    msg.style.fontSize = "1.5rem";

    // Thêm hiệu ứng rung (giữ nguyên)
    msg.style.animation = "none";
    void msg.offsetWidth;
    msg.style.animation = "shake 0.4s ease-in-out"; 
}

function correctDinner() {
    const msg = document.getElementById("dinner-message");
    msg.textContent = "Good choice… you know me too well. 😌💕";
    
    // Màu xanh lá đậm để phân biệt với lúc sai
    msg.style.color = "#d63384"; 
    msg.style.opacity = 1;
    msg.style.fontSize = "1.5rem";
    msg.style.fontWeight = "900";

    setTimeout(() => {
        window.location.href = "after.html";
    }, 2000);
}
    </script>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <script>
    const music = document.getElementById("bg-music");
const offsetTime = 0.8; // Lùi lại 0.8s để nhạc nối tiếp mượt hơn
        
    // 1. Khôi phục thời gian đã chơi từ localStorage
    window.addEventListener("load", () => {
        const savedTime = localStorage.getItem("musicTime");
        if (savedTime) {
            music.currentTime = parseFloat(savedTime);
        }
        
        // Thử tự động phát ngay khi load (thường sẽ bị trình duyệt chặn)
        music.play().catch(() => {
            console.log("Autoplay bị chặn, chờ tương tác người dùng...");
        });
    });

    // 2. Ép phát nhạc ngay khi người dùng chạm/click bất cứ đâu trên màn hình
    const playMusic = () => {
        music.play();
        // Sau khi đã phát thành công, gỡ bỏ event để tránh lãng phí tài nguyên
        document.removeEventListener("click", playMusic);
        document.removeEventListener("touchstart", playMusic);
    };

    document.addEventListener("click", playMusic);
    document.addEventListener("touchstart", playMusic); // Quan trọng cho Mobile

    // 3. Lưu lại thời gian liên tục để sang trang sau nhạc không bị phát lại từ đầu
    music.addEventListener("timeupdate", () => {
        localStorage.setItem("musicTime", music.currentTime);
    });
</script>
</body>
</html>
