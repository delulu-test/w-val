<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner First 💕</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="hearts-bg"></div>

<div class="container" style="padding-top: 20px; margin-top: 10px;">
    <h1>First… where are we having dinner? 😌</h1>
    
<div style="height: 50px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;">
            <p id="dinner-message" style="font-weight: 800; font-size: 1.2rem; color: #ff1493; margin: 0;"></p>
        </div>
    
    <div class="food-grid">

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/thai.png">
            <p>Thai Market</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/salmon.png">
            <p>Salmon Club</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/manwah.jpg">
            <p>Manwah</p>
        </div>

        <div class="food-card" onclick="wrongDinner()">
            <img src="images/gogi.png">
            <p>Gogi</p>
        </div>

        <div class="food-card" onclick="correctDinner()">
            <img src="images/4p.png">
            <p>4P's</p>
        </div>

    </div>

</div>

<script>
const wrongMessages = [
    "My stomach says no.🙅‍♀️",
    "My stomach says no.🤧",
    "Try again!💔",
    "Error 404: Appetite not found. 🚫",
    "Ugh, no!🤧"
]

function wrongDinner() {
            const msg = document.getElementById("dinner-message");
            msg.style.transition = "none";
            msg.style.opacity = 0;
            void msg.offsetWidth; 

            msg.textContent = wrongMessages[Math.floor(Math.random() * wrongMessages.length)];
            msg.style.color = "#ff9ab7";
            msg.style.transition = "opacity 0.5s ease";
            msg.style.opacity = 1;

            // Thêm hiệu ứng rung
            msg.style.animation = "none";
            void msg.offsetWidth;
            msg.style.animation = "shake 0.7s ease-in-out";
        }

        function correctDinner() {
            const msg = document.getElementById("dinner-message");
            msg.textContent = "Good choice… you know me too well. 😌💕";
            msg.style.color = "#ff9ac4";
            msg.style.opacity = 1;
            msg.style.fontWeight = "900";

            setTimeout(() => {
                window.location.href = "after.html";
            }, 2000);
        }
    </script>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById("bg-music");
        window.addEventListener("load", () => {
            const savedTime = localStorage.getItem("musicTime");
            if (savedTime) music.currentTime = savedTime;
            music.play().catch(() => {});
        });
        music.addEventListener("timeupdate", () => {
            localStorage.setItem("musicTime", music.currentTime);
        });
    </script>
</body>
</html>
