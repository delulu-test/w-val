<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Night 🎬</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="hearts-bg"></div>

    <div class="container yes-container">

    <h1 class="yes-title">Movie night it is 🎬💕</h1>

    <div class="gif-container">
        <img id="cat-gif" src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="celebrating">
    </div>

    <p class="yes-message">
        Okay fine… I’ll go watch a movie with you.  
        But you’re not allowed to sit too far away 😌
    </p>

    <!-- 👇 THÊM NÚT Ở ĐÂY -->
    <button onclick="window.location.href='final.html'" class="continue-btn">
        Continue 🤍
    </button>

</div>
    
     <!-- 🎵 MUSIC -->
    <audio id="bg-music" autoplay loop>
    <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
</audio>
<script>
const music = document.getElementById("bg-music");
const offsetTime = 1; // Lùi lại 1s để nhạc nối tiếp mượt hơn

// Khi trang load
window.addEventListener("load", () => {
    const savedTime = localStorage.getItem("musicTime");
    if (savedTime) music.currentTime = savedTime;
});

// 👇 CHO MOBILE
document.addEventListener("click", function () {
    music.play().catch(()=>{});
}, { once: true });

music.addEventListener("timeupdate", () => {
    localStorage.setItem("musicTime", music.currentTime);
});
// Lưu thời gian hiện tại liên tục
music.addEventListener("timeupdate", () => {
    localStorage.setItem("musicTime", music.currentTime)
})
</script>

    <script src="yes-script.js"></script>

</body>
</html>
