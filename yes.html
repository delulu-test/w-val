<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Night 🎬</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="hearts-bg"></div>

    <div class="container yes-container">

    <h1 class="yes-title">Movie night it is 🎬💕</h1>

    <div class="gif-container">
        <img id="cat-gif" src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="celebrating">
    </div>

    <p class="yes-message">
        Okay fine… I’ll go watch a movie with you.  
        But you’re not allowed to sit too far away 😌
    </p>

    <!-- 👇 THÊM NÚT Ở ĐÂY -->
    <button onclick="window.location.href='final.html'" class="continue-btn">
        Continue 🤍
    </button>

</div>
    
     <!-- 🎵 MUSIC -->
    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

   <script>
    const music = document.getElementById("bg-music");
       
    // 1. Khôi phục vị trí nhạc ngay khi trang vừa nạp
    const savedTime = localStorage.getItem("musicTime");
    if (savedTime) {
        let startTime = parseFloat(savedTime) - offsetTime;
        music.currentTime = startTime > 0 ? startTime : 0;
    }

    // 2. Hàm cố gắng phát nhạc
    function tryPlayMusic() {
        music.play().catch(() => {
            console.log("Trình duyệt đợi bạn chạm vào màn hình để tiếp tục nhạc...");
        });
    }

    // Tự động phát ngay khi load (Nếu trang trước đã được click, trang này sẽ tự hát)
    window.addEventListener("load", tryPlayMusic);

    // Dự phòng nếu bị chặn: Click/Chạm bất cứ đâu để kích hoạt
    document.addEventListener("click", tryPlayMusic, { once: true });
    document.addEventListener("touchstart", tryPlayMusic, { once: true });

    // 3. Liên tục cập nhật vị trí nhạc vào bộ nhớ
    music.addEventListener("timeupdate", () => {
        localStorage.setItem("musicTime", music.currentTime);
    });
</script>

    <script src="yes-script.js"></script>

</body>
</html>
