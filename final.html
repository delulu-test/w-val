<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💕</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="hearts-bg"></div>

<div class="container">
    
<div class="floating-photos hidden" id="final-photos">
    <div class="float-img img1">
        <img src="images/flower.jpg">
    </div>

    <div class="float-img img2">
        <img src="images/pizza1.jpg">
    </div>

    <div class="float-img img3">
        <img src="images/flowers2.png">
    </div>

    <div class="float-img img4">
        <img src="images/hb.jpg">
    </div>
</div>

<h1 id="final-text"></h1>
</div>

<audio id="bg-music" loop preload="auto">
    <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("bg-music");
    const offsetTime = 0.8; 

    // 1. Nhảy giây ngay lập tức
    const savedTime = localStorage.getItem("musicTime");
    if (savedTime) {
        music.currentTime = parseFloat(savedTime) - offsetTime;
    }

    // 2. Hàm phát nhạc
    function playMusic() {
        music.play().catch(() => {});
    }

    // Thử phát ngay
    playMusic();

    // 3. Dự phòng cho Mobile
    document.addEventListener("click", playMusic, { once: true });
    document.addEventListener("touchstart", playMusic, { once: true });

    // 4. Lưu thời gian liên tục (để trang cuối cùng vẫn lưu được dữ liệu)
    setInterval(() => {
        if (!music.paused) {
            localStorage.setItem("musicTime", music.currentTime);
        }
    }, 500);
</script>
    
<script>
const lines = [
    "Movie night it is 🎬💕, but before that...",
    "Thank you for being so gentle and patient with me.",
    "Thank you for choosing to stay.",
    "I hope we get to create more little moments like this.",
    "More laughter, more soft days.",
    "And more memories together 🤍"
];

let current = 0;
const text = document.getElementById("final-text");
    const finalPhotos = document.getElementById("final-photos");

function typeLine() {
    if (current < lines.length) {
        text.style.opacity = 0;

        setTimeout(() => {
            text.textContent = lines[current];
            text.style.opacity = 1;

            // 👇 Nếu là dòng cuối cùng
            if (current === lines.length - 1) {
                setTimeout(() => {
                    finalPhotos.classList.remove("hidden");
                    finalPhotos.classList.add("show");
                }, 500);
            }

            current++;
        }, 400);

        setTimeout(typeLine, 3000);
    }
}
window.onload = typeLine;
</script>

</body>
</html>
