<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💕</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="hearts-bg"></div>

<div class="container">
    
<div class="floating-photos hidden" id="final-photos">
    <div class="float-img img1">
        <img src="flower.jpg">
    </div>

    <div class="float-img img2">
        <img src="pizza1.jpg">
    </div>

    <div class="float-img img3">
        <img src="flowers2.png">
    </div>

    <div class="float-img img4">
        <img src="hb.jpg">
    </div>
</div>

<h1 id="final-text"></h1>
</div>

<audio id="bg-music" autoplay loop>
    <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
</audio>
<script>
const music = document.getElementById("bg-music");
const offsetTime = 1; // Lùi lại 1s để nhạc nối tiếp mượt hơn

// Khi trang load
window.addEventListener("load", () => {
    const savedTime = localStorage.getItem("musicTime");
    if (savedTime) music.currentTime = savedTime;
});

// 👇 CHO MOBILE
document.addEventListener("click", function () {
    music.play().catch(()=>{});
}, { once: true });

music.addEventListener("timeupdate", () => {
    localStorage.setItem("musicTime", music.currentTime);
});
// Lưu thời gian hiện tại liên tục
music.addEventListener("timeupdate", () => {
    localStorage.setItem("musicTime", music.currentTime)
})
</script>
<script>
const lines = [
    "Movie night it is 🎬💕",
    "But before that...",
    "Thank you for being so gentle and patient with me.",
    "Thank you for choosing to stay.",
    "I hope we get to create more little moments like this.",
    "More laughter.",
    "More soft days.",
    "And more memories together 🤍"
];

let current = 0;
const text = document.getElementById("final-text");
    const finalPhotos = document.getElementById("final-photos");

function typeLine() {
    if (current < lines.length) {
        text.style.opacity = 0;

        setTimeout(() => {
            text.textContent = lines[current];
            text.style.opacity = 1;

            // 👇 Nếu là dòng cuối cùng
            if (current === lines.length - 1) {
                setTimeout(() => {
                    finalPhotos.classList.remove("hidden");
                    finalPhotos.classList.add("show");
                }, 500);
            }

            current++;
        }, 400);

        setTimeout(typeLine, 3000);
    }
}
window.onload = typeLine;
</script>

</body>
</html>
