<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>After Dinner 👀</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="hearts-bg"></div>

<div class="container">
    <h1>Dinner is settled... so what’s next? 👀</h1>

    <div class="options">

        <div class="option" onclick="selectOption('picnic')">
            <img src="https://images.unsplash.com/photo-1523986371872-9d3ba2e2f642" />
            <p>Picnic 🌸</p>
        </div>

        <div class="option" onclick="selectOption('cafe')">
            <img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb" />
            <p>Café ☕</p>
        </div>

        <div class="option" onclick="selectOption('themepark')">
            <img src="https://images.unsplash.com/photo-1509228468518-180dd4864904" />
            <p>Theme Park 🎡</p>
        </div>

        <div class="option" onclick="selectOption('pottery')">
            <img src="https://images.unsplash.com/photo-1604014237800-1c9102c219da" />
            <p>Pottery 🎨</p>
        </div>

        <div class="option" onclick="selectOption('craft')">
            <img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2" />
            <p>Craft Things 🧵</p>
        </div>

        <div class="option" onclick="selectOption('movie')">
            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba" />
            <p>Movie 🎬</p>
        </div>

    </div>

    <p id="after-message" style="margin-top:20px; font-weight:600;"></p>

</div>

<script>
function selectOption(choice){

    if(choice === "movie"){
        window.location.href = "yes.html";
    } else {

        const lines = [
            "Hmm… that sounds fun, but I had something else in mind 😌",
            "That would be cute… but I’m thinking something cozier.",
            "Close… but not quite what I was hoping for.",
            "You’re getting warmer 🤭 try again.",
            "Not bad… but I want dim lights and popcorn energy."
        ];

        const randomLine = lines[Math.floor(Math.random() * lines.length)];

        document.getElementById("after-message").textContent = randomLine;
    }
}
</script>

</body>
</html>
