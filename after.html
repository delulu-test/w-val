<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>After Dinner 👀</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="after-page">
    
    <div class="hearts-bg"></div>

<div class="container">
    <h1>Dinner is settled... so what’s next? 👀</h1>

<div class="options">   <!-- 👈 THÊM CÁI NÀY -->
        
        <div class="option" onclick="selectOption('cafe')">
            <img src="images/cafe.jpg" alt="Cafe">
            <p>Café ☕</p>
        </div>

        <div class="option" onclick="selectOption('highland')">
            <img src="images/highland.jpg" alt="higland">
            <p>Highlands CF</p>
        </div>

        <div class="option" onclick="selectOption('pottery')">
            <img src="images/potterry.jpg" alt="Pottery">
            <p>Pottery 🎨</p>
        </div>

        <div class="option" onclick="selectOption('craft')">
            <img src="images/craft.jpg" alt="Craft">
            <p>Craft Things 🧵</p>
        </div>

        <div class="option" onclick="selectOption('movie')">
            <img src="images/movie.jpg" alt="Movie">
            <p>Movie 🎬</p>
        </div>

        <div class="option" onclick="selectOption('bida')">
            <img src="images/bida.jpg" alt="bida">
            <p>Pool 🎱</p>
        </div>

    </div>  <!-- 👈 ĐÓNG GRID -->
</div>

    <p id="after-message" style="margin-top:20px; font-weight:600;"></p>

</div>

<script>
function selectOption(choice){

    if(choice === "movie"){
        window.location.href = "yes.html";
    } else {

        const lines = [
            "Hmm… that sounds fun, but I had something else in mind 😌",
            "That would be cute… but I’m thinking something cozier.",
            "Close… but not quite what I was hoping for.",
            "You’re getting warmer 🤭 try again.",
            "Not bad… but I want dim lights and popcorn energy."
        ];

        const randomLine = lines[Math.floor(Math.random() * lines.length)];

        document.getElementById("after-message").textContent = randomLine;
    }
}
</script>

</body>
   <audio id="bg-music" autoplay loop>
    <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
</audio>
<script>
const music = document.getElementById("bg-music")
const offsetTime = 1; // Lùi lại 1s để nhạc nối tiếp mượt hơn
    
// Khi trang load
window.addEventListener("load", () => {
    const savedTime = localStorage.getItem("musicTime");
    if (savedTime) music.currentTime = savedTime;
});

// 👇 CHO MOBILE
document.addEventListener("click", function () {
    music.play().catch(()=>{});
}, { once: true });

music.addEventListener("timeupdate", () => {
    localStorage.setItem("musicTime", music.currentTime);
});
// Lưu thời gian hiện tại liên tục
music.addEventListener("timeupdate", () => {
    localStorage.setItem("musicTime", music.currentTime)
})
</script>
</body>
</html>
